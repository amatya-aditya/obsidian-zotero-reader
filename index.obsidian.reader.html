<!DOCTYPE html>
<html
	lang="en"
	dir="ltr"
	style="
		--sidebar-width: 240px;
		--split-view-size: 50%;
		--bottom-placeholder-height: 50px;
		--toolbar-placeholder-width: 0px;
	"
>
	<head>
		<meta charset="UTF-8" />
		<title>Zotero Reader</title>
		<base href="/" />

		<!-- Script to set up the environment from obsidian -->
		<script>
			(() => {
				// Set base URL
				document
					.querySelector("base")
					.setAttribute("href", window.parent.location.origin + "/");

				// Set up MathJax
				window.MathJax = {
					chtml: {
						adaptiveCSS: false,
						fontURL: window.parent.MathJax.config.chtml.fontURL,
					},
					loader: {
						paths: window.parent.MathJax.config.loader.paths,
					},
					startup: {
						typeset: true,
					},
				};
			})();
		</script>

		<!-- Loading MathJax -->
		<script src="/lib/mathjax/tex-chtml-full.js"></script>

		<!-- Loading Enhance.js -->
		<script src="/enhance.js" type="text/javascript"></script>

		<!-- Script to copy and scope Obsidian app.css styles -->
		<script>
			(() => {
				const processRuleList = (ruleList, prefix) => {
					let out = "";
					for (const rule of Array.from(ruleList || [])) {
						switch (rule.type) {
							case CSSRule.STYLE_RULE: {
								out += prefixStyleRule(rule, prefix) + "\n";
								break;
							}
							case CSSRule.MEDIA_RULE: {
								const inner = processRuleList(
									rule.cssRules,
									prefix
								);
								if (inner.trim())
									out += `@media ${rule.conditionText}{\n${inner}}\n`;
								break;
							}
							case CSSRule.SUPPORTS_RULE: {
								const inner = processRuleList(
									rule.cssRules,
									prefix
								);
								if (inner.trim())
									out += `@supports ${rule.conditionText}{\n${inner}}\n`;
								break;
							}
							case CSSRule.IMPORT_RULE: {
								try {
									out +=
										processRuleList(
											rule.styleSheet.cssRules,
											prefix
										) + "\n";
								} catch (e) {
									console.warn(
										"Could not access @import stylesheet:",
										e
									);
								}
								break;
							}
							case CSSRule.KEYFRAMES_RULE:
							case CSSRule.FONT_FACE_RULE:
							case CSSRule.PAGE_RULE:
							case CSSRule.COUNTER_STYLE_RULE:
							default: {
								// Copy as-is (we do not prefix @keyframes names, @font-face, etc.)
								out += rule.cssText + "\n";
							}
						}
					}
					return out;
				};

				const prefixStyleRule = (rule, prefix) => {
					const sel = rule.selectorText;

					const block = rule.style.cssText;

					const prefixedSelector = prefixSelectors(sel, prefix);
					return `${prefixedSelector}{${block}}`;
				};

				function splitSelectorList(sel) {
					const out = [];
					let buf = "";
					let p = 0,
						b = 0;
					let str = null,
						esc = false;
					for (let i = 0; i < sel.length; i++) {
						const ch = sel[i];
						if (str) {
							buf += ch;
							if (esc) {
								esc = false;
								continue;
							}
							if (ch === "\\") {
								esc = true;
								continue;
							}
							if (ch === str) str = null;
							continue;
						}
						if (ch === '"' || ch === "'") {
							str = ch;
							buf += ch;
							continue;
						}
						if (ch === "(") {
							p++;
							buf += ch;
							continue;
						}
						if (ch === ")") {
							p = Math.max(0, p - 1);
							buf += ch;
							continue;
						}
						if (ch === "[") {
							b++;
							buf += ch;
							continue;
						}
						if (ch === "]") {
							b = Math.max(0, b - 1);
							buf += ch;
							continue;
						}
						if (ch === "," && p === 0 && b === 0) {
							if (buf.trim()) out.push(buf.trim());
							buf = "";
							continue;
						}
						buf += ch;
					}
					if (buf.trim()) out.push(buf.trim());
					return out;
				}

				// Pull a trailing pseudo-element (e.g., ::after) off the end of a selector
				function extractTrailingPseudo(s) {
					const m = s.match(
						/^(.*?)(::[a-z-]+(?:\([^)]*\))?|:(?:before|after|first-line|first-letter))\s*$/i
					);
					if (m) return { base: m[1].trim(), pseudo: m[2] };
					return { base: s.trim(), pseudo: "" };
				}

				// Safely prefix a selector list.
				// But if a selector starts with html/body/:root, we must replace that leftmost part.
				const prefixSelectors = (selectorText, prefix) => {
					const selectors = splitSelectorList(selectorText);
					const transformed = selectors.map((sel) => {
						const { base, pseudo } = extractTrailingPseudo(sel);

						// Replace a leading html/body/:root with the prefix
						const rooty = /^(?:\s*)(:root|html|body)\b/i;
						let baseWithPrefix;
						if (rooty.test(base)) {
							baseWithPrefix = base.replace(rooty, prefix); // e.g., "body.foo" -> ".scoped.foo"
						} else {
							baseWithPrefix = `${prefix} ${base}`; // e.g., ".scoped .list-bullet:hover"
						}
						return `${baseWithPrefix}${pseudo}`;
					});
					return transformed.join(", ");
				};

				const cssChunks = [];
				const appSheets = Array.from(
					window.parent?.document?.styleSheets || []
				).filter(
					(sheet) =>
						sheet.href &&
						sheet.href.startsWith(window.origin) &&
						sheet.href.includes("app.css")
				);

				for (const sheet of appSheets) {
					try {
						cssChunks.push(
							processRuleList(sheet.cssRules, ".obsidian-app")
						);
					} catch (e) {
						// Cross-origin or protected stylesheet will throw here.
						console.warn("Could not access stylesheet rules:", e);
					}
				}

				const cssText = cssChunks.join("\n");
				const constructed = new document.defaultView.CSSStyleSheet();
				constructed.replaceSync(cssText);
				document.adoptedStyleSheets = [
					...document.adoptedStyleSheets,
					constructed,
				];
			})();
		</script>

		<!-- Script to extract Obsidian theme variables and apply them to the document -->
		<script>
			(() => {
				const extractObsidianStylesVars = () => {
					const extractCSSVariables = (selector) => {
						const variables = {};

						Array.from(window.parent.document.styleSheets)
							.filter(
								(sheet) =>
									sheet.href === null ||
									sheet.href.startsWith(window.origin)
							)
							.forEach((sheet) => {
								try {
									Array.from(sheet.cssRules).forEach(
										(rule) => {
											const styleRule = rule;
											if (
												styleRule.selectorText &&
												styleRule.selectorText
													.split(",")
													.map((s) => s.trim())
													.includes(selector) &&
												styleRule.style
											) {
												Array.from(
													styleRule.style
												).forEach((name) => {
													if (name.startsWith("--")) {
														variables[name] =
															styleRule.style.getPropertyValue(
																name
															);
													}
												});
											}
										}
									);
								} catch (e) {
									console.warn(
										"Could not access stylesheet rules:",
										e
									);
								}
							});

						return variables;
					};
					const bodyVariables = extractCSSVariables("body");
					const themeLightVariables =
						extractCSSVariables(".theme-light");
					const themeDarkVariables =
						extractCSSVariables(".theme-dark");

					return {
						":root, :root > .obsidian-app": bodyVariables,
						"html.obsidian-theme-light, html.obsidian-theme-light .obsidian-app":
							themeLightVariables,
						"html.obsidian-theme-dark, html.obsidian-theme-dark .obsidian-app":
							themeDarkVariables,
					};
				};
				// Extract Obsidian theme variables and apply them to the document
				window.OBSIDIAN_THEME_VARIABLES = extractObsidianStylesVars();
				const varsStyle = document.createElement("style");
				varsStyle.textContent = Object.entries(
					window.OBSIDIAN_THEME_VARIABLES
				)
					.map(
						([sel, map]) =>
							`${sel}{${Object.entries(map)
								.map(([k, v]) => `${k}:${v};`)
								.join("")}}`
					)
					.join("");

				const constructed = new document.defaultView.CSSStyleSheet();
				constructed.replaceSync(varsStyle.textContent);
				document.adoptedStyleSheets = [
					...document.adoptedStyleSheets,
					constructed,
				];

				const theme = getComputedStyle(
					window.parent.document.body
				).colorScheme;

				document.documentElement.classList.toggle(
					"obsidian-theme-dark",
					theme === "dark"
				);
				document.documentElement.classList.toggle(
					"obsidian-theme-light",
					theme === "light"
				);
			})();
		</script>

		<!-- Webpack will inject the reader.js here -->
		<% for (const js of htmlWebpackPlugin.files.js) { %>
		<script src="<%= js %>" type="module" defer></script>
		<% } %>

		<!-- Styles for scrollbar -->
		<style>
			::-webkit-scrollbar {
				background-color: var(--scrollbar-bg);
				width: var(--scrollbar-width);
				height: var(--scrollbar-height);
				-webkit-border-radius: var(--scrollbar-radius);
				background-color: transparent;
			}

			::-webkit-scrollbar-track {
				background-color: transparent;
			}

			::-webkit-scrollbar-thumb {
				background-color: var(--scrollbar-thumb-bg);
				-webkit-border-radius: var(--scrollbar-radius);
				background-clip: padding-box;
				border: 2px solid transparent;
				border-width: var(--scrollbar-border-width);
				min-height: 45px;
			}

			::-webkit-scrollbar-thumb:active {
				-webkit-border-radius: var(--scrollbar-radius);
			}

			::-webkit-scrollbar-thumb:hover,
			::-webkit-scrollbar-thumb:active {
				background-color: var(--scrollbar-active-thumb-bg);
			}

			::-webkit-scrollbar-corner {
				background: transparent;
			}
			@supports not selector(::-webkit-scrollbar) {
				:root {
					scrollbar-width: thin;
					scrollbar-color: var(--scrollbar-thumb-bg)
						var(--scrollbar-bg);
				}
			}
		</style>

		<!-- Webpack will inject the reader.css here -->
		<% for (const css of htmlWebpackPlugin.files.css) { %>
		<link rel="stylesheet" href="<%= css %>" />
		<% } %>
	</head>
	<body class="sidebar-open">
		<div id="reader-ui"></div>
		<div id="split-view">
			<div
				id="primary-view"
				class="primary-view"
				style="opacity: 0"
			></div>
			<div
				id="secondary-view"
				class="secondary-view"
				style="opacity: 0"
			></div>
		</div>
		<div id="printContainer"></div>
	</body>
</html>
